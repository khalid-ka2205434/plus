<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plus | Profile</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="main-header">
        <a href="feed.html" class="logo-link">
            <img src="assets/images/logo.png" alt="Plus Logo" class="logo-image">
        </a>

        <nav class="nav-links">
            <a href="feed.html" class="nav-btn">Feed</a>
            <a href="profile.html" class="nav-btn">Profile</a>
            <button id="profileLogoutBtn" class="nav-btn signup-btn">Logout</button>
        </nav>
    </header>

    <main class="profile-page">
        <section class="profile-card">
            <h1>My Profile</h1>

            <div class="profile-image-box">
                <img id="profileImage" src="" alt="Profile Picture" class="profile-image">
            </div>

            <div class="form-group">
                <label>Change Profile Picture</label>

                <div class="avatar-options">
                    <label class="avatar-choice">
                        <input type="radio" name="editProfilePicture" value="assets/images/avatar1.png">
                        <img src="assets/images/avatar1.png" alt="Avatar 1" class="avatar-option-image">
                    </label>

                    <label class="avatar-choice">
                        <input type="radio" name="editProfilePicture" value="assets/images/avatar2.png">
                        <img src="assets/images/avatar2.png" alt="Avatar 2" class="avatar-option-image">
                    </label>

                    <label class="avatar-choice">
                        <input type="radio" name="editProfilePicture" value="assets/images/avatar3.png">
                        <img src="assets/images/avatar3.png" alt="Avatar 3" class="avatar-option-image">
                    </label>

                    <label class="avatar-choice">
                        <input type="radio" name="editProfilePicture" value="assets/images/avatar4.png">
                        <img src="assets/images/avatar4.png" alt="Avatar 4" class="avatar-option-image">
                    </label>

                    <label class="avatar-choice">
                        <input type="radio" name="editProfilePicture" value="assets/images/avatar5.png">
                        <img src="assets/images/avatar5.png" alt="Avatar 5" class="avatar-option-image">
                    </label>
                </div>

                <button type="button" id="savePictureBtn" class="primary-btn">Save Picture</button>
            </div>

            <div class="profile-info">
                <p><strong>Username:</strong> <span id="profileUsername"></span></p>
                <p><strong>Email:</strong> <span id="profileEmail"></span></p>
                <p><strong>Bio:</strong> <span id="profileBio"></span></p>
            </div>

            <form id="bioForm" class="bio-form">
                <div class="form-group">
                    <label for="bioInput">Edit Bio</label>
                    <textarea id="bioInput" rows="4" placeholder="Write your new bio"></textarea>
                </div>
                <button type="submit" class="primary-btn">Save Bio</button>
            </form>
        </section>

        <section class="posts-section">
            <h2>My Posts</h2>
            <div id="myPostsContainer"></div>
        </section>
    </main>

    <script src="js/profile.js"></script>
</body>
</html>
