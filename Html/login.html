<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plus | Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="form-page">
        <section class="form-container">
            <div class="form-logo">
                <a href="index.html" class="logo-link">
                    <img src="assets/images/logo.png" alt="Plus Logo" class="form-logo-image">
                </a>
            </div>

            <h1>Login to Plus</h1>
            <p class="form-subtitle">Enter your account information below.</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" name="loginEmail" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" name="loginPassword" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="primary-btn full-width-btn">Login</button>
            </form>

            <p class="form-footer">
                Don't have an account?
                <a href="signup.html">Sign Up</a>
            </p>

            <p class="form-footer">
                <a href="index.html">Back to Home</a>
            </p>
        </section>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
