<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plus | User Profile</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="main-header">
        <a href="feed.html" class="logo-link">
            <img src="assets/images/logo.png" alt="Plus Logo" class="logo-image">
        </a>

        <nav class="nav-links">
            <a href="feed.html" class="nav-btn">Feed</a>
            <a href="profile.html" class="nav-btn">Profile</a>
            <button id="upLogoutBtn" class="nav-btn signup-btn">Logout</button>
        </nav>
    </header>

    <main class="profile-page">
        <section class="profile-card" id="userProfileContainer">
            <p>Loading profile...</p>
        </section>

        <section class="posts-section">
            <h2 id="userPostsTitle">Posts</h2>
            <div id="userPostsContainer"></div>

            <p class="form-footer" style="margin-top: 16px;">
                <a href="feed.html">Back to Feed</a>
            </p>
        </section>
    </main>

    <script src="js/user-profile.js"></script>
</body>
</html>
