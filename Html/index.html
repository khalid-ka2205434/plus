<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plus | Welcome</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="main-header">
        <a href="index.html" class="logo-link">
            <img src="assets/images/logo.png" alt="Plus Logo" class="logo-image">
        </a>

        <nav class="nav-links">
            <a href="login.html" class="nav-btn">Login</a>
            <a href="signup.html" class="nav-btn signup-btn">Sign Up</a>
        </nav>
    </header>

    <main class="hero-section">
        <section class="hero-text">
            <h1>Welcome to Plus</h1>
            <p>
                Share your thoughts, connect with others, and enjoy a simple social media experience.
            </p>

            <div class="hero-buttons">
                <a href="login.html" class="primary-btn">Login</a>
                <a href="signup.html" class="secondary-btn">Create Account</a>
            </div>
        </section>

        <section class="hero-card">
            <h2>Why Plus?</h2>
            <ul>
                <li>Create and share posts</li>
                <li>Like and comment on posts</li>
                <li>Follow other users</li>
                <li>Manage your profile easily</li>
            </ul>
        </section>
    </main>
</body>
</html>
